<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="58" y="54" width="84" height="100" rx="10" ry="10" fill="white" opacity="0.95"/>

  <!-- Clipboard clip -->
  <rect x="80" y="46" width="40" height="18" rx="9" ry="9" fill="#1e3a8a"/>
  <rect x="86" y="52" width="28" height="6" rx="3" ry="3" fill="#60a5fa"/>

  <!-- Heart on clipboard -->
  <path d="M100 88 C100 88 86 78 86 70 C86 64 91 60 96 62 C98 63 100 65 100 65 C100 65 102 63 104 62 C109 60 114 64 114 70 C114 78 100 88 100 88Z" fill="#ef4444"/>

  <!-- ECG / pulse line -->
  <polyline points="62,118 76,118 82,106 88,130 94,112 100,118 108,118 114,118 120,118 130,118 138,118"
            fill="none" stroke="url(#pulse)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Lines suggesting "paperless" text on clipboard -->
  <rect x="70" y="136" width="60" height="5" rx="2.5" fill="#bfdbfe"/>
  <rect x="70" y="146" width="44" height="5" rx="2.5" fill="#bfdbfe"/>
</svg>
