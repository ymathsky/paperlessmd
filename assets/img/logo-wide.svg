<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Icon badge -->
  <rect x="0" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="13" y="16" width="30" height="34" rx="4" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="21" y="12" width="14" height="8" rx="4" fill="#1e3a8a"/>
  <rect x="23" y="14" width="10" height="4" rx="2" fill="#60a5fa"/>

  <!-- Heart -->
  <path d="M28 28 C28 28 22 24 22 20.5 C22 18 24 16.5 26 17.5 C27 18 28 19 28 19 C28 19 29 18 30 17.5 C32 16.5 34 18 34 20.5 C34 24 28 28 28 28Z" fill="#ef4444"/>

  <!-- ECG line -->
  <polyline points="14,38 18,38 20,34 23,42 26,36 28,38 32,38 35,38 39,38 42,38"
            fill="none" stroke="url(#pulse)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="68" y="28" font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="800" fill="#1e3a8a" letter-spacing="-0.5">Paperless</text>
  <text x="68" y="52" font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="800" fill="#2563eb" letter-spacing="-0.5">MD</text>

  <!-- Tagline dots -->
  <circle cx="100" cy="52" r="2.5" fill="#ef4444"/>
</svg>
