<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Staff — PaperlessMD</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; background: #f1f5f9; }
  input:focus { outline: none; }
  .role-card input[type="radio"] { accent-color: currentColor; }
</style>
</head>
<body class="min-h-screen p-6">

<!-- ── Breadcrumb ───────────────────────────────── -->
<nav class="flex items-center gap-2 text-sm text-slate-400 mb-6 max-w-2xl mx-auto">
  <a href="#" class="hover:text-blue-600 font-medium transition-colors">Manage Staff</a>
  <i class="bi bi-chevron-right text-xs"></i>
  <span class="text-slate-700 font-semibold">Add Staff Member</span>
</nav>

<!-- ── Card ─────────────────────────────────────── -->
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

  <!-- Header -->
  <div class="bg-gradient-to-r from-indigo-600 to-indigo-500 px-6 py-5 flex items-center gap-4">
    <div class="w-11 h-11 bg-white/20 rounded-xl flex items-center justify-center shrink-0">
      <i class="bi bi-person-plus-fill text-white text-xl"></i>
    </div>
    <div>
      <h2 class="text-white font-bold text-lg leading-tight">Add Staff Member</h2>
      <p class="text-indigo-200 text-sm mt-0.5">Create a new staff account and assign a role</p>
    </div>
  </div>

  <div class="p-6 sm:p-8">

    <!-- Error banner (hidden by default) -->
    <div id="errorBanner" class="hidden mb-6 flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
      <i class="bi bi-exclamation-circle-fill mt-0.5 shrink-0"></i>
      <span id="errorText">Username and full name are required.</span>
    </div>

    <form id="staffForm" novalidate>

      <!-- ── Row 1: Full Name + Email ── -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">
            Full Name <span class="text-red-400">*</span>
          </label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
              <i class="bi bi-person-fill text-sm"></i>
            </span>
            <input type="text" name="full_name" placeholder="Dr. Jane Smith"
                   class="w-full pl-9 pr-4 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50
                          focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition"
                   required autofocus>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">
            Email <span class="text-slate-400 font-normal text-xs">(for notifications)</span>
          </label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
              <i class="bi bi-envelope-fill text-sm"></i>
            </span>
            <input type="email" name="email" placeholder="jsmith@example.com"
                   class="w-full pl-9 pr-4 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50
                          focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition"
                   autocomplete="email">
          </div>
        </div>
      </div>

      <!-- ── Username ── -->
      <div class="mb-5">
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">
          Username <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
            <i class="bi bi-at text-sm"></i>
          </span>
          <input type="text" name="username" placeholder="jsmith"
                 class="w-full pl-9 pr-4 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50
                        focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition font-mono"
                 autocomplete="off" required>
        </div>
        <p class="text-xs text-slate-400 mt-1.5 ml-1">Used to log in. Lowercase letters and numbers only.</p>
      </div>

      <!-- ── Role ── -->
      <div class="mb-5">
        <label class="block text-sm font-semibold text-slate-700 mb-2">Role</label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

          <!-- MA -->
          <label class="role-card flex items-start gap-3 p-3.5 border-2 border-slate-200 rounded-xl cursor-pointer transition-all
                         hover:border-indigo-300 has-[:checked]:border-indigo-400 has-[:checked]:bg-indigo-50">
            <input type="radio" name="role" value="ma" checked class="mt-0.5 w-4 h-4 text-indigo-600 border-slate-300 focus:ring-indigo-400 shrink-0">
            <div class="min-w-0">
              <div class="flex items-center gap-1.5">
                <i class="bi bi-person-badge-fill text-indigo-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">Medical Assistant</span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">Full clinical access — forms, vitals, wounds, notes</div>
            </div>
          </label>

          <!-- Provider -->
          <label class="role-card flex items-start gap-3 p-3.5 border-2 border-slate-200 rounded-xl cursor-pointer transition-all
                         hover:border-teal-300 has-[:checked]:border-teal-400 has-[:checked]:bg-teal-50">
            <input type="radio" name="role" value="provider" class="mt-0.5 w-4 h-4 text-teal-600 border-slate-300 focus:ring-teal-400 shrink-0">
            <div class="min-w-0">
              <div class="flex items-center gap-1.5">
                <i class="bi bi-clipboard2-pulse-fill text-teal-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">Provider</span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">Physician / NP — signs &amp; reviews forms</div>
            </div>
          </label>

          <!-- Scheduler -->
          <label class="role-card flex items-start gap-3 p-3.5 border-2 border-slate-200 rounded-xl cursor-pointer transition-all
                         hover:border-violet-300 has-[:checked]:border-violet-400 has-[:checked]:bg-violet-50">
            <input type="radio" name="role" value="scheduler" class="mt-0.5 w-4 h-4 text-violet-600 border-slate-300 focus:ring-violet-400 shrink-0">
            <div class="min-w-0">
              <div class="flex items-center gap-1.5">
                <i class="bi bi-calendar-week-fill text-violet-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">Scheduler</span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">Schedule management only</div>
            </div>
          </label>

          <!-- PCC -->
          <label class="role-card flex items-start gap-3 p-3.5 border-2 border-slate-200 rounded-xl cursor-pointer transition-all
                         hover:border-teal-300 has-[:checked]:border-teal-400 has-[:checked]:bg-teal-50">
            <input type="radio" name="role" value="pcc" class="mt-0.5 w-4 h-4 text-teal-600 border-slate-300 focus:ring-teal-400 shrink-0">
            <div class="min-w-0">
              <div class="flex items-center gap-1.5">
                <i class="bi bi-heart-pulse-fill text-teal-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">PCC
                  <span class="font-normal text-slate-400 text-xs">Patient Care Coordinator</span>
                </span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">Clinical access — same as MA</div>
            </div>
          </label>

          <!-- Billing -->
          <label class="role-card flex items-start gap-3 p-3.5 border-2 border-slate-200 rounded-xl cursor-pointer transition-all
                         hover:border-amber-300 has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
            <input type="radio" name="role" value="billing" class="mt-0.5 w-4 h-4 text-amber-600 border-slate-300 focus:ring-amber-400 shrink-0">
            <div class="min-w-0">
              <div class="flex items-center gap-1.5">
                <i class="bi bi-receipt text-amber-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">Billing</span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">Forms &amp; ICD-10 codes — read only</div>
            </div>
          </label>

          <!-- Admin -->
          <label class="role-card flex items-start gap-3 p-3.5 border-2 border-slate-200 rounded-xl cursor-pointer transition-all
                         hover:border-rose-300 has-[:checked]:border-rose-400 has-[:checked]:bg-rose-50">
            <input type="radio" name="role" value="admin" class="mt-0.5 w-4 h-4 text-rose-600 border-slate-300 focus:ring-rose-400 shrink-0">
            <div class="min-w-0">
              <div class="flex items-center gap-1.5">
                <i class="bi bi-shield-fill-check text-rose-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">Admin</span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">Full access including staff management</div>
            </div>
          </label>

        </div>
      </div>

      <!-- ── Password ── -->
      <div class="border-t border-slate-100 pt-5 mb-5">
        <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
          <i class="bi bi-lock-fill text-slate-400"></i> Password
        </h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">
              Password <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <input type="password" name="password" id="pw1" placeholder="Min. 6 characters"
                     class="w-full pl-4 pr-10 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50
                            focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition"
                     autocomplete="new-password" required>
              <button type="button" onclick="togglePw('pw1','eyeBtn1')"
                      class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
                <i id="eyeBtn1" class="bi bi-eye text-sm"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm Password</label>
            <div class="relative">
              <input type="password" name="password2" id="pw2" placeholder="Repeat password"
                     class="w-full pl-4 pr-10 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50
                            focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition"
                     autocomplete="new-password">
              <button type="button" onclick="togglePw('pw2','eyeBtn2')"
                      class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
                <i id="eyeBtn2" class="bi bi-eye text-sm"></i>
              </button>
            </div>
          </div>
        </div>
        <!-- Password strength bar -->
        <div class="mt-2.5 h-1.5 bg-slate-100 rounded-full overflow-hidden">
          <div id="strengthBar" class="h-full rounded-full transition-all duration-300 w-0"></div>
        </div>
        <p id="strengthLabel" class="text-xs text-slate-400 mt-1"></p>
      </div>

      <!-- ── Actions ── -->
      <div class="flex flex-col sm:flex-row gap-3 pt-1">
        <button type="submit"
                class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 active:scale-95
                       text-white font-bold px-8 py-3 rounded-xl transition-all shadow-sm hover:shadow-md text-sm">
          <i class="bi bi-check-circle-fill"></i> Create Account
        </button>
        <a href="#"
           class="flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold
                  text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
          <i class="bi bi-x-circle"></i> Cancel
        </a>
      </div>

    </form>
  </div>
</div>

<!-- ── Edit mode toggle (demo) ───────────────────── -->
<div class="max-w-2xl mx-auto mt-4 flex gap-2 justify-end">
  <button onclick="setMode('add')" class="text-xs px-3 py-1.5 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 transition">
    Demo: Add mode
  </button>
  <button onclick="setMode('edit')" class="text-xs px-3 py-1.5 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 transition">
    Demo: Edit mode
  </button>
  <button onclick="showError()" class="text-xs px-3 py-1.5 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 transition">
    Demo: Show error
  </button>
</div>

<script>
function togglePw(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash text-sm';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye text-sm';
  }
}

// Password strength
document.getElementById('pw1').addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  if (!val) { bar.style.width = '0'; lbl.textContent = ''; return; }
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w: '20%',  color: 'bg-red-400',    text: 'Weak',      textColor: 'text-red-500' },
    { w: '40%',  color: 'bg-orange-400', text: 'Fair',      textColor: 'text-orange-500' },
    { w: '60%',  color: 'bg-yellow-400', text: 'Good',      textColor: 'text-yellow-600' },
    { w: '80%',  color: 'bg-teal-400',   text: 'Strong',    textColor: 'text-teal-600' },
    { w: '100%', color: 'bg-green-500',  text: 'Very strong', textColor: 'text-green-600' },
  ];
  const l = levels[Math.min(score, 4)];
  bar.style.width = l.w;
  bar.className   = `h-full rounded-full transition-all duration-300 ${l.color}`;
  lbl.textContent = l.text;
  lbl.className   = `text-xs mt-1 ${l.textColor}`;
});

// Demo helpers
function setMode(mode) {
  const heading = document.querySelector('.bg-gradient-to-r h2');
  const sub     = document.querySelector('.bg-gradient-to-r p');
  const icon    = document.querySelector('.bg-gradient-to-r i');
  const btn     = document.querySelector('button[type="submit"]');
  if (mode === 'edit') {
    heading.textContent = 'Edit Staff Member';
    sub.textContent = 'Maria Khan';
    icon.className = 'bi bi-pencil-fill text-white text-xl';
    btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Save Changes';
    document.querySelector('[name="full_name"]').value = 'Maria Khan';
    document.querySelector('[name="username"]').value  = 'mkhan';
    document.querySelector('[name="email"]').value     = 'mkhan@clinic.com';
    document.querySelector('[value="ma"]').checked     = true;
  } else {
    heading.textContent = 'Add Staff Member';
    sub.textContent = 'Create a new staff account and assign a role';
    icon.className = 'bi bi-person-plus-fill text-white text-xl';
    btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Create Account';
    document.querySelector('[name="full_name"]').value = '';
    document.querySelector('[name="username"]').value  = '';
    document.querySelector('[name="email"]').value     = '';
  }
}

function showError() {
  const b = document.getElementById('errorBanner');
  b.classList.remove('hidden');
  b.classList.add('flex');
  document.getElementById('errorText').textContent = 'Username and full name are required.';
  b.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
