ServerName localhost

<VirtualHost *:80>
    DocumentRoot /app
    DirectoryIndex index.php

    <Directory /app>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Deny access to sensitive files
    <FilesMatch "\.(env|gitignore|md|toml|json|lock|sh)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^(install|seed_staff|_patch|_tmp|migrate_)">
        Require all denied
    </FilesMatch>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
