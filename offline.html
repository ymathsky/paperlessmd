<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline — PaperlessMD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6"
      style="background: linear-gradient(135deg, #172554 0%, #1e3a8a 40%, #1d4ed8 100%)">

    <div class="text-center max-w-sm w-full">
        <!-- Icon -->
        <div class="inline-flex w-24 h-24 bg-white/15 backdrop-blur-sm rounded-3xl items-center justify-center mb-6 shadow-2xl ring-1 ring-white/20 mx-auto">
            <i class="bi bi-cloud-slash-fill text-white" style="font-size:2.6rem"></i>
        </div>

        <h1 class="text-white font-extrabold text-2xl mb-2">You're Offline</h1>
        <p class="text-blue-200 text-sm mb-8 leading-relaxed">
            No internet connection detected. If you were filling out a form, your data was automatically saved and will sync when you're back online.
        </p>

        <!-- Pending indicator -->
        <div id="pendingInfo" class="hidden bg-amber-400/20 border border-amber-400/30 rounded-2xl px-4 py-3 mb-6 text-amber-200 text-sm flex items-center gap-2 justify-center">
            <i class="bi bi-clock-history"></i>
            <span id="pendingText">Forms pending sync</span>
        </div>

        <div class="space-y-3">
            <button onclick="window.history.back()"
                    class="w-full py-3 px-4 bg-white/20 hover:bg-white/30 text-white font-semibold rounded-2xl transition text-sm flex items-center justify-center gap-2">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>
            <button onclick="window.location.reload()"
                    class="w-full py-3 px-4 bg-white text-blue-900 font-semibold rounded-2xl hover:bg-blue-50 transition text-sm flex items-center justify-center gap-2">
                <i class="bi bi-arrow-clockwise"></i> Try Again
            </button>
        </div>
    </div>

    <script>
    // Show pending count if available
    (async function () {
        try {
            const req = indexedDB.open('pd-offline', 1);
            req.onsuccess = function (e) {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('form_queue')) return;
                const tx  = db.transaction('form_queue', 'readonly');
                const idx = tx.objectStore('form_queue').index('status');
                idx.count(IDBKeyRange.only('pending')).onsuccess = function (ev) {
                    const count = ev.target.result;
                    if (count > 0) {
                        document.getElementById('pendingInfo').classList.remove('hidden');
                        document.getElementById('pendingText').textContent =
                            count + ' form' + (count > 1 ? 's' : '') + ' saved — will sync when online';
                    }
                };
            };
        } catch (_) {}

        // Auto-reload when back online
        window.addEventListener('online', () => window.location.reload());
    })();
    </script>
</body>
</html>
